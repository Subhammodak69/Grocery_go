{% extends 'admin/home.html' %}
{% load static %}
{% block title %}Update Admin Poster{% endblock %}

{% block content %}

<!-- jQuery (Required for Select2) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Select2 -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script src="{% static 'js/admin/poster/poster_update.js' %}"></script>

<div class="card shadow-sm m-auto mt-4 p-4 rounded" style="max-width:600px;">

<h2 class="mb-4 text-center fw-bold" style="color:#007bff;">
Update Admin Poster
</h2>

<form class="px-3" id="adminposterForm" onsubmit="return false;" novalidate>

<input value="{{poster.id}}" id="poster_id" hidden>

<!-- Product Select -->
<div class="mb-3">
<select id="product_id" name="product_id" class="form-select" required>
<option value="">{{poster.product.name}}</option>

{% for product in products %}
<option value="{{ product.id }}">
{{ product.name }}
</option>
{% endfor %}

</select>
</div>

<!-- Title -->
<div class="mb-3">
<label class="form-label fw-semibold">Title*</label>
<input
type="text"
value="{{poster.title}}"
id="title"
class="form-control"
placeholder="Enter Title"
required
>
</div>

<!-- Description -->
<div class="mb-3">
<label class="form-label fw-semibold">Description</label>

<textarea
id="description"
class="form-control"
placeholder="Enter Description"
>{{poster.description}}</textarea>

</div>

<!-- Start Date -->
<div class="mb-3">
<label class="form-label fw-semibold">Start Date*</label>

<input
type="date"
value="{{ poster.start_date|date:'Y-m-d' }}"
id="start_date"
class="form-control"
required
>

</div>

<!-- End Date -->
<div class="mb-3">
<label class="form-label fw-semibold">End Date*</label>

<input
type="date"
value="{{poster.end_date|date:'Y-m-d'}}"
id="end_date"
class="form-control"
required
>

</div>

<!-- Old Image -->
<div class="mb-3">
<img
src="{% static poster.image %}"
height="100px"
class="rounded"
>
</div>

<!-- Upload Image -->
<div class="mb-3">

<label class="form-label fw-semibold">
New Image File
</label>

<button
type="button"
id="chooseFileBtn"
class="btn btn-outline-primary"
>
Choose File
</button>

<input
type="file"
id="image"
accept="image/*"
style="display:none;"
>

</div>

<!-- Preview -->
<div class="mb-3" id="preview"></div>

<!-- Submit -->
<button
type="submit"
onclick="poster_update()"
class="btn btn-primary fw-bold mt-3 w-100"
style="padding:12px;font-size:18px;"
>
Update Poster
</button>

</form>

<div id="message" class="text-center mt-4 fw-semibold"></div>

</div>

<!-- Select2 Init -->
<script>

$(document).ready(function(){

$('#product_id').select2({
width:'100%',
placeholder:'Select Product'
});

});

</script>

<!-- File Upload Preview -->
<script>

const fileInput=document.getElementById('image');
const chooseFileBtn=document.getElementById('chooseFileBtn');
const previewDiv=document.getElementById('preview');

chooseFileBtn.addEventListener('click',()=>{
fileInput.click();
});

fileInput.addEventListener('change',(event)=>{

previewDiv.innerHTML='';

const file=event.target.files[0];

if(file){

const img=document.createElement('img');

img.src=URL.createObjectURL(file);

img.style.height='100px';
img.style.borderRadius='6px';
img.style.marginTop='10px';

previewDiv.appendChild(img);

}

});

</script>

<style>

#message.error{
margin:20px auto;
color:#dc3545;
}

#message.success{
margin:20px auto;
color:#28a745;
}

</style>

{% endblock %}
